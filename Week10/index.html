<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week10 task</title>
    <link rel="stylesheet" href="style.css">

</head>


<body>
    <div id="container">
        <h1>歡迎使用匯率轉換器</h1>
        <input type="text" id="input" placeholder="請輸入金額">
        <span>
            <select name="ExchangeRate1" id="er1">
                <option value="TWD">台幣</option>
                <option value="USD">美金</option>
                <option value="JPY">日圓</option>
                <option value="EUR">歐元</option>
                <option value="GBP">英鎊</option>
                <option value="AUD">澳幣</option>
                <option value="CNY">人民幣</option>
            </select>
        </span>
        <button id="change">交換</button>
        <span>
            <select name="ExchangeRate2" id="er2">
                <option value="TWD">台幣</option>
                <option value="USD">美金</option>
                <option value="JPY">日圓</option>
                <option value="EUR">歐元</option>
                <option value="GBP">英鎊</option>
                <option value="AUD">澳幣</option>
                <option value="CNY">人民幣</option>
            </select>
        </span>

        <button id="btn">轉換</button>
        <br />
        <output>
            <h2>Result:</h2>
            <h2 id="output"></h2>
            <h3 id="nowdate"></h3>
        </output>
    </div>



    <script src=" script.js">
    </script>
</body>

</html>
